# Track A Read/Write Sidecar — training configuration
# Used by scripts/train_track_a_readwrite.py
#
# Architecture: Frozen Qwen3.5-0.8B-Base + LoRA + ESN read/write reservoir sidecar
# Extends T14 (read-only) with WriteHead: LLM hidden states → reservoir input signal.
# Write gate linearly increases from 0→1 over write_gate_warmup_steps (curriculum).

# ---------------------------------------------------------------------------
# Model
# ---------------------------------------------------------------------------
model_name: "qwen3.5-0.8b"
dtype: "bfloat16"
device: "cuda"

# ---------------------------------------------------------------------------
# T14 checkpoint (read-only pretrained; WriteHead is randomly initialized)
# ---------------------------------------------------------------------------
checkpoint: "checkpoints/track_a_readonly/final"

# ---------------------------------------------------------------------------
# ESN reservoir (same topology as T14)
# ---------------------------------------------------------------------------
reservoir_size: 10000          # number of reservoir nodes
spectral_radius: 0.9           # controls echo state property (< 1 for stability)
leak_rate: 0.5                 # leaky integration rate (0=slow memory, 1=no memory)
input_scaling: 1.0             # input weight scaling
reservoir_sparsity: 0.01       # fraction of non-zero reservoir weights
reservoir_seed: 42

# ---------------------------------------------------------------------------
# Write head curriculum
# ---------------------------------------------------------------------------
write_gate_warmup_steps: 1000  # gate linearly increases 0→1 over first 1K steps

# ---------------------------------------------------------------------------
# Sidecar injection
# ---------------------------------------------------------------------------
# sidecar_layers: null → defaults to every 4th layer (3, 7, 11, ...)
sidecar_layers: null
num_heads: 8                   # CrossAttentionSidecar attention heads
sidecar_dropout: 0.0

# ---------------------------------------------------------------------------
# LoRA adapter settings
# ---------------------------------------------------------------------------
lora_rank: 16                  # LoRA rank r (same as T14)
lora_alpha: 32.0               # LoRA scaling (typically 2× rank)
lora_dropout: 0.05
lora_targets:                  # Q/V projections only (Track A spec)
  - q_proj
  - v_proj

# ---------------------------------------------------------------------------
# Optimizer
# ---------------------------------------------------------------------------
lr: 2.0e-4                     # LoRA adapter learning rate
interface_lr: 1.0e-3           # sidecar (ReadProjection + CrossAttentionSidecar + WriteHead) LR
weight_decay: 0.01

# ---------------------------------------------------------------------------
# LR schedule: cosine decay with linear warmup
# ---------------------------------------------------------------------------
warmup_steps: 100
max_steps: 5000                # ~5K additional steps beyond T14 pretraining

# ---------------------------------------------------------------------------
# Training loop
# ---------------------------------------------------------------------------
batch_size: 4
grad_accum: 4                  # effective batch = 4 × 4 = 16
max_seq_length: 2048
gradient_checkpointing: true
seed: 42

# ---------------------------------------------------------------------------
# Data: FineWeb subset (same as T14)
# ---------------------------------------------------------------------------
dataset_name: "HuggingFaceFW/fineweb"
dataset_config: "sample-10BT"

# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------
output_dir: "checkpoints/track_a_readwrite"
results_file: "results/track_a/readwrite.json"
log_interval: 50
save_interval: 1000

# ---------------------------------------------------------------------------
# Weights & Biases (optional)
# ---------------------------------------------------------------------------
no_wandb: false
wandb_project: "lrs-track-a"
wandb_run_name: "track-a-readwrite-qwen3.5-0.8b"
